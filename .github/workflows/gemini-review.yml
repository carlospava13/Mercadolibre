name: "Gemini Code Review"

# Esto le dice a GitHub que corra la acción cada vez que abras o actualices un PR
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

# Permisos necesarios para que el bot pueda escribir comentarios
permissions:
  contents: read
  pull-requests: write

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    steps:
      - name: "Run AI Code Review"
        uses: petarzarkov/gemini-code-review-action@latest
        with:
          # Le indicamos que te hable en español
          language: Spanish
          # Excluimos archivos de configuración para no gastar tokens analizando cosas que no son código
          exclude: '*.md,*.json,Podfile.lock,*.pbxproj,*.xcworkspace/*'
        env:
          # El GITHUB_TOKEN ya viene incluido gratis en GitHub, no tienes que crearlo
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Esta es la llave que guardaste en el Paso 2
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
