name: "Gemini Code Review"

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  gemini-review:
    if: (github.event.pull_request.additions && github.event.pull_request.deletions) > 400
    runs-on: ubuntu-latest
    steps:
      - name: "Run AI Code Review"
        uses: petarzarkov/gemini-code-review-action@latest
        with:
          # Actualizado a la versión 2.5 Flash
          model: 'gemini-2.5-flash'
          exclude: '*.md,*.json,Podfile.lock,*.pbxproj,*.xcworkspace/*'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
